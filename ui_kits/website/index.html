      radial-gradient(2px 2px at 50% 75%, rgba(244,213,141,0.8), transparent),

      radial-gradient(1.5px 1.5px at 65% 80%, rgba(244,213,141,0.6), transparent);
    animation: hover 8s ease-in-out infinite alternate;
  }
  @keyframes hover { to { transform: translateY(-12px); } }
  .pyramid {

  @keyframes floaty { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(0.5deg); } }

  /* Fade-up + char rise */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { opacity: 0; animation: fadeUp .9s cubic-bezier(.22,.61,.36,1) forwards; }
  .in-view { opacity: 0; transform: translateY(40px); transition: opacity .8s cubic-bezier(.22,.61,.36,1), transform .8s cubic-bezier(.22,.61,.36,1); }

  .light-shafts {

  .light-shafts::after {
    content: ""; position: absolute; inset: 0; opacity: 0.3;
    background: repeating-linear-gradient(115deg, transparent 0px, transparent 90px, rgba(244,213,141,0.08) 90px, rgba(244,213,141,0.08) 140px);

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
/* ============================================================
   Visit Sudan — standalone preview (full)
   Mirrors src/App.jsx without framer-motion / R3F / Lenis / GSAP.
   Static fallbacks for: Hero3D (CSS), Lottie/Confetti/Sound (omitted),
   ScrollDirector reveal (IntersectionObserver-based).
   ============================================================ */

const { useEffect, useRef, useState } = React;

/* ---------- Reveal helper (mimics ScrollDirector's data-rise) ---------- */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll(".in-view");
    const io = new IntersectionObserver(
      (entries) => entries.forEach((e) => e.isIntersecting && e.target.classList.add("show")),
      { threshold: 0.15 }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  });
}

/* ---------- Scroll progress bar ---------- */
function useScrollProgress() {
  useEffect(() => {
    const bar = document.getElementById("scroll-bar");
    const onScroll = () => {
      const h = document.documentElement;
      const p = h.scrollTop / (h.scrollHeight - h.clientHeight);
      bar.style.transform = `scaleX(${p})`;
    };
    onScroll();
    window.addEventListener("scroll", onScroll, { passive: true });
    return () => window.removeEventListener("scroll", onScroll);
  }, []);
}

/* ============================================================
   NAVIGATION
   ============================================================ */
function Navigation() {
  const links = ["Destinations", "Experiences", "Culture", "Guide", "Gallery"];
  return (
    <header className="fade-up fixed inset-x-0 top-0 z-50 border-b border-white/10 bg-black/30 backdrop-blur-xl">
      <nav className="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
        <a href="#" className="text-lg font-bold tracking-[0.3em] text-goldLight">VISIT SUDAN</a>
        <div className="hidden gap-8 text-sm text-white/75 md:flex">
          {links.map((l) => (
            <a key={l} href={`#${l.toLowerCase()}`} className="hover:text-goldLight transition">{l}</a>
          ))}
        </div>
        <a href="#plan" className="rounded-full border border-gold/60 px-5 py-2 text-sm font-semibold text-goldLight transition hover:bg-gold hover:text-black">Start Planning</a>
      </nav>
    </header>
  );
}

/* ============================================================

   ============================================================ */
function Pyramid({ left, size, color = "#D9A441", delay = 0 }) {

        borderLeft: `${size}px solid transparent`,

        borderBottom: `${size * 1.4}px solid ${color}`,

}
function Hero() {
  return (
    <section className="relative min-h-screen overflow-hidden">
      <div className="hero-scene">
        <div className="hero-stars" />
        <div className="hero-grid" />
        <Pyramid left="10%" size={70} color="#D9A441" delay={0} />
        <Pyramid left="28%" size={50} color="#F4D58D" delay={0.6} />
        <Pyramid left="50%" size={90} color="#D9A441" delay={1.2} />
        <Pyramid left="72%" size={42} color="#A87A22" delay={0.3} />
        <Pyramid left="86%" size={60} color="#F4D58D" delay={0.9} />
        <div className="hero-particles" />
      </div>

      <div className="pointer-events-none absolute inset-x-0 bottom-0 h-1/2 bg-gradient-to-b from-transparent to-ink" />

          Scroll to enter Sudan

      </div>
    </section>
  );
}

/* ============================================================
   MARQUEE
   ============================================================ */
function Marquee() {
  const items = ["Sudan, Untold", "Meroë", "The Nile", "Red Sea", "Jebel Barkal", "Nubian Villages", "Desert Silence", "Khartoum", "Suakin"];

/* ============================================================
   RIPPLE GALLERY
   ============================================================ */
function RippleCard({ title, caption, big }) {
  const ref = useRef(null);
  const onMove = (e) => {
    const el = ref.current; if (!el) return;
    const r = el.getBoundingClientRect();
    el.style.setProperty("--mx", `${((e.clientX - r.left) / r.width) * 100}%`);
    el.style.setProperty("--my", `${((e.clientY - r.top) / r.height) * 100}%`);
  };
  return (
    <div ref={ref} onMouseMove={onMove}
      className={`group relative overflow-hidden rounded-[2.5rem] border border-white/10 transition duration-700 ${big ? "md:col-span-2 md:row-span-2 min-h-[640px]" : "min-h-[300px]"}`}
      style={{
