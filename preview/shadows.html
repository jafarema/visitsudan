<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 32px; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.s { aspect-ratio: 1.2; background: #14110D; border-radius: 22px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; }
.s .tok { font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.08em;
  color: #D9A441; }
.s .px { font-family: "Space Grotesk", monospace; font-size: 10px; color: rgba(255,248,232,0.5); margin-top: 4px; }
</style></head>
<body>
  <div class="eyebrow">Shadows &amp; elevation</div>
  <div class="grid" style="margin-top: 20px;">
    <div class="s" style="box-shadow:0 1px 2px rgba(0,0,0,.4)"><div class="tok">shadow-1</div><div class="px">hairline</div></div>
    <div class="s" style="box-shadow:0 12px 32px -16px rgba(0,0,0,.55)"><div class="tok">shadow-2</div><div class="px">card lift</div></div>
    <div class="s" style="box-shadow:0 32px 80px -24px rgba(0,0,0,.6)"><div class="tok">shadow-3</div><div class="px">cinematic</div></div>
    <div class="s" style="box-shadow:0 0 0 1px rgba(217,164,65,.4), 0 12px 40px -8px rgba(217,164,65,.35)"><div class="tok" style="color:#E8C079">glow</div><div class="px">primary CTA</div></div>
  </div>
</body></html>
