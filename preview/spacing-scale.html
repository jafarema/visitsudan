<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.row { display: flex; align-items: center; gap: 16px; padding: 5px 0; }
.tok { font-family: "Space Grotesk", monospace; font-size: 11px; letter-spacing: 0.06em;
  color: rgba(255,248,232,0.65); width: 70px; }
.px { font-family: "Space Grotesk", monospace; font-size: 10px; color: rgba(255,248,232,0.4);
  width: 56px; text-align: right; }
.bar { height: 14px; background: linear-gradient(90deg,#D9A441,#A87A22); border-radius: 2px; }
</style></head>
<body>
  <div class="eyebrow">Spacing scale · 8pt + editorial</div>
  <div style="margin-top: 14px;">
    <div class="row"><span class="tok">--s-1</span><span class="px">4</span><div class="bar" style="width:4px"></div></div>
    <div class="row"><span class="tok">--s-2</span><span class="px">8</span><div class="bar" style="width:8px"></div></div>
    <div class="row"><span class="tok">--s-3</span><span class="px">12</span><div class="bar" style="width:12px"></div></div>
    <div class="row"><span class="tok">--s-4</span><span class="px">16</span><div class="bar" style="width:16px"></div></div>
    <div class="row"><span class="tok">--s-5</span><span class="px">24</span><div class="bar" style="width:24px"></div></div>
    <div class="row"><span class="tok">--s-6</span><span class="px">32</span><div class="bar" style="width:32px"></div></div>
    <div class="row"><span class="tok">--s-7</span><span class="px">48</span><div class="bar" style="width:48px"></div></div>
    <div class="row"><span class="tok">--s-8</span><span class="px">64</span><div class="bar" style="width:64px"></div></div>
    <div class="row"><span class="tok">--s-9</span><span class="px">96</span><div class="bar" style="width:96px"></div></div>
    <div class="row"><span class="tok">--s-10</span><span class="px">128</span><div class="bar" style="width:128px"></div></div>
    <div class="row"><span class="tok">--s-11</span><span class="px">192</span><div class="bar" style="width:192px"></div></div>
  </div>
</body></html>
