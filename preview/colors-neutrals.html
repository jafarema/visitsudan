<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.scale { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-top: 18px; }
.stack { display: flex; flex-direction: column; border-radius: 14px; overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(255,248,232,0.10); }
.row2 { display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; font-family: "Space Grotesk", monospace; font-size: 11px;
  letter-spacing: 0.06em; }
.row2 .lbl { text-transform: uppercase; font-weight: 600; }
.row2 .hex { opacity: 0.6; font-size: 10px; }
.col-title { font-family: "Space Grotesk", monospace; font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,248,232,0.45);
  margin-bottom: 8px; }
</style></head>
<body>
  <div class="eyebrow">Surfaces &amp; lines</div>
  <div class="scale">
    <div>
      <div class="col-title">Ink surfaces</div>
      <div class="stack">
        <div class="row2" style="background:#080706;color:#FFF8E8"><span class="lbl">bg-1 · ink</span><span class="hex">#080706</span></div>
        <div class="row2" style="background:#14110D;color:#FFF8E8"><span class="lbl">bg-2 · ink-2</span><span class="hex">#14110D</span></div>
        <div class="row2" style="background:#1F1A14;color:#FFF8E8"><span class="lbl">bg-3 · ink-3</span><span class="hex">#1F1A14</span></div>
      </div>
    </div>
    <div>
      <div class="col-title">Ivory text on ink</div>
      <div class="stack" style="background:#080706">
        <div class="row2" style="color:#FFF8E8"><span class="lbl">fg-1 · 100%</span><span class="hex">FFF8E8</span></div>
        <div class="row2" style="color:rgba(255,248,232,0.72)"><span class="lbl">fg-2 · 72%</span><span class="hex">0.72</span></div>
        <div class="row2" style="color:rgba(255,248,232,0.48)"><span class="lbl">fg-3 · 48%</span><span class="hex">0.48</span></div>
        <div class="row2" style="color:rgba(255,248,232,0.14)"><span class="lbl">line · 14%</span><span class="hex">0.14</span></div>
      </div>
    </div>
  </div>
</body></html>
