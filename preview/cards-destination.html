<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px; }
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.card { border-radius: 22px; overflow: hidden; }
.img { aspect-ratio: 4/5; position: relative;
  background-image: radial-gradient(60% 80% at 50% 70%, rgba(217,164,65,0) 0%, rgba(8,7,6,0.85) 100%), linear-gradient(180deg,#5a3a18 0%,#2a1208 80%);
  display: flex; flex-direction: column; justify-content: space-between; padding: 16px; }
.img.b { background-image: radial-gradient(60% 80% at 50% 70%, rgba(14,90,122,0) 0%, rgba(8,7,6,0.9) 100%), linear-gradient(180deg,#0E5A7A 0%,#0a1a22 100%); }
.tag { font-family: "Space Grotesk", monospace; font-size: 10px; letter-spacing: 0.18em;
  text-transform: uppercase; color: #FFF8E8;
  background: rgba(20,17,13,0.55); backdrop-filter: blur(12px);
  padding: 6px 10px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(255,248,232,0.18);
  width: fit-content; }
.meta { display: flex; align-items: baseline; justify-content: space-between; }
.num { font-family: "Space Grotesk", monospace; font-size: 10px; letter-spacing: 0.18em;
  color: #D9A441; }
.title { font-family: "Fraunces", serif; font-size: 24px; color: #FFF8E8; line-height: 1.05;
  letter-spacing: -0.02em; margin-top: 12px; font-variation-settings: "opsz" 144;}
.dek { font-family: "Inter", sans-serif; font-size: 12px; color: rgba(255,248,232,0.55); margin-top: 4px; }
.below { padding: 12px 2px 0; }
</style></head>
<body>
  <div class="eyebrow">Destination card · default + dark</div>
  <div class="cards" style="margin-top: 14px;">
    <div class="card">
      <div class="img">
        <div class="tag">Northern State</div>
        <div class="meta"><span class="num">01 / 06</span></div>
      </div>
      <div class="below">
        <div class="title">Meroë</div>
        <div class="dek">200 royal pyramids in golden sand</div>
      </div>
    </div>
    <div class="card">
      <div class="img b">
        <div class="tag">Red Sea</div>
        <div class="meta"><span class="num">04 / 06</span></div>
      </div>
      <div class="below">
        <div class="title">Suakin</div>
        <div class="dek">A coral island city the Ottomans built</div>
      </div>
    </div>
  </div>
</body></html>
