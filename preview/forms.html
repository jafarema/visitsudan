<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 26px; }
.grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 22px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field .lbl { font-family: "Space Grotesk", monospace; font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase; color: #D9A441; }
.field input, .field .sel {
  font-family: "Inter", sans-serif; font-size: 14px; color: #FFF8E8;
  background: transparent; border: none;
  border-bottom: 1px solid rgba(255,248,232,0.22);
  padding: 10px 0; outline: none;
  transition: border-color 220ms cubic-bezier(.22,.61,.36,1);
}
.field input:focus { border-bottom-color: #D9A441; }
.field input::placeholder { color: rgba(255,248,232,0.4); }
.sel { display: flex; justify-content: space-between; align-items: center; }
.sel .v { color: #FFF8E8; }
.sel .chev { color: rgba(255,248,232,0.5); }
.field.filled input { border-bottom-color: #D9A441; }
.row2 { display: flex; gap: 14px; margin-top: 18px; }
.tog { display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 999px; box-shadow: inset 0 0 0 1px rgba(255,248,232,0.22);
  font-family: "Inter"; font-size: 12px; color: rgba(255,248,232,0.85); }
.tog.on { background: rgba(217,164,65,0.12); color: #E8C079; box-shadow: inset 0 0 0 1px #D9A441; }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.6; }
</style></head>
<body>
  <div class="eyebrow">Fields · underline editorial style</div>
  <div class="grid" style="margin-top: 14px;">
    <div class="field filled">
      <div class="lbl">Travelling from</div>
      <input value="Berlin → Khartoum" />
    </div>
    <div class="field">
      <div class="lbl">When</div>
      <div class="sel"><span class="v">November 2026</span><span class="chev">⌄</span></div>
    </div>
  </div>
  <div class="row2">
    <span class="tog on"><span class="dot"></span>Cultural</span>
    <span class="tog"><span class="dot"></span>Desert</span>
    <span class="tog"><span class="dot"></span>Diving</span>
    <span class="tog"><span class="dot"></span>Nile cruise</span>
  </div>
</body></html>
