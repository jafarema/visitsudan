<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 18px; }
.sw { aspect-ratio: 1; border-radius: 14px; position: relative; overflow: hidden;
  display: flex; flex-direction: column; justify-content: flex-end; padding: 12px; }
.sw .name { font-family: "Space Grotesk", monospace; font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; }
.sw .hex { font-family: "Space Grotesk", monospace; font-size: 10px; opacity: 0.7;
  letter-spacing: 0.04em; margin-top: 2px; }
.sw.dark { color: #FFF8E8; }
.sw.light { color: #2A1F12; }
.sw.bordered { box-shadow: inset 0 0 0 1px rgba(255,248,232,0.18); }
</style></head>
<body>
  <div class="eyebrow">Core palette · 6 tokens</div>
  <div class="grid">
    <div class="sw dark bordered" style="background:#080706"><div class="name">Ink</div><div class="hex">#080706</div></div>
    <div class="sw dark" style="background:#D9A441"><div class="name" style="color:#1A1208">Gold</div><div class="hex" style="color:#1A1208">#D9A441</div></div>
    <div class="sw light" style="background:#E7C994"><div class="name">Sand</div><div class="hex">#E7C994</div></div>
    <div class="sw dark" style="background:#0E5A7A"><div class="name">Nile</div><div class="hex">#0E5A7A</div></div>
    <div class="sw dark" style="background:#B3261E"><div class="name">Red</div><div class="hex">#B3261E</div></div>
    <div class="sw light" style="background:#FFF8E8"><div class="name">Ivory</div><div class="hex">#FFF8E8</div></div>
  </div>
</body></html>
