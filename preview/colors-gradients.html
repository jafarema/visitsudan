<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-top: 16px; }
.g { aspect-ratio: 3/4; border-radius: 16px; padding: 14px; display: flex; align-items: flex-end;
  box-shadow: inset 0 0 0 1px rgba(255,248,232,0.10); }
.g .name { font-family: "Space Grotesk", monospace; font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase; font-weight: 600; color: #FFF8E8;
  text-shadow: 0 1px 8px rgba(0,0,0,0.6); }
</style></head>
<body>
  <div class="eyebrow">Gradients · cinematic ramps</div>
  <div class="grid">
    <div class="g" style="background:linear-gradient(180deg,#E7C994 0%,#D9A441 38%,#B3261E 78%,#2A1208 100%)"><div class="name">Sunset</div></div>
    <div class="g" style="background:linear-gradient(180deg,#1F1A14 0%,#080706 100%)"><div class="name">Dune</div></div>
    <div class="g" style="background:linear-gradient(180deg,#0E5A7A 0%,#084156 60%,#080706 100%)"><div class="name">Nile</div></div>
    <div class="g" style="background:linear-gradient(180deg,rgba(8,7,6,0) 0%,rgba(8,7,6,0.85) 100%),#5a3a18"><div class="name">Protect</div></div>
  </div>
</body></html>
