<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-top: 16px; }
.r { aspect-ratio: 1; background: #14110D; box-shadow: inset 0 0 0 1px rgba(255,248,232,0.15);
  display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 6px;
  text-align: center; }
.r .tok { font-family: "Space Grotesk", monospace; font-size: 10px; letter-spacing: 0.06em;
  color: #D9A441; }
.r .px { font-family: "Space Grotesk", monospace; font-size: 10px; color: rgba(255,248,232,0.5); margin-top: 2px; }
</style></head>
<body>
  <div class="eyebrow">Radius scale</div>
  <div class="grid">
    <div class="r" style="border-radius:4px"><div class="tok">--r-xs</div><div class="px">4px</div></div>
    <div class="r" style="border-radius:8px"><div class="tok">--r-sm</div><div class="px">8px</div></div>
    <div class="r" style="border-radius:14px"><div class="tok">--r-md</div><div class="px">14px</div></div>
    <div class="r" style="border-radius:22px"><div class="tok">--r-lg</div><div class="px">22px</div></div>
    <div class="r" style="border-radius:32px"><div class="tok">--r-xl</div><div class="px">32px</div></div>
    <div class="r" style="border-radius:999px"><div class="tok">--r-pill</div><div class="px">∞</div></div>
  </div>
</body></html>
