<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
body { padding: 24px; }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.logo { aspect-ratio: 1.4/1; border-radius: 18px;
  display: flex; align-items: center; justify-content: center; }
.l-dark { background: #080706; box-shadow: inset 0 0 0 1px rgba(255,248,232,0.12); }
.l-ivory { background: #FFF8E8; }
.l-gold { background: linear-gradient(180deg,#E7C994 0%,#D9A441 70%,#A87A22 100%); }
.mark { display: flex; align-items: center; gap: 12px; }
.glyph { width: 36px; height: 36px; position: relative; }
.glyph svg { width: 100%; height: 100%; }
.name { font-family: "Fraunces", serif; font-size: 22px; letter-spacing: -0.01em;
  font-variation-settings: "opsz" 144; line-height: 1; }
.name b { font-weight: 500; }
.name .v { display: block; font-size: 22px; }
.lbl { font-family: "Space Grotesk", monospace; font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; color: rgba(255,248,232,0.45);
  position: absolute; top: 12px; left: 14px; }
.lbl.d { color: rgba(42,31,18,0.55); }
</style></head>
<body>
  <div class="eyebrow">Wordmark · three grounds</div>
  <div class="grid" style="margin-top: 12px; position: relative;">
    <div class="logo l-dark" style="position:relative">
      <span class="lbl">on ink</span>
      <div class="mark">
        <div class="glyph">
          <svg viewBox="0 0 40 40" fill="none">
            <path d="M4 34 L20 6 L36 34 Z" stroke="#D9A441" stroke-width="2" stroke-linejoin="round"/>
            <path d="M11 34 L20 18 L29 34" stroke="#D9A441" stroke-width="2" stroke-linejoin="round" opacity="0.55"/>
          </svg>
        </div>
        <div class="name" style="color:#FFF8E8">Visit<b style="color:#D9A441"> Sudan</b></div>
      </div>
    </div>
    <div class="logo l-ivory" style="position:relative">
      <span class="lbl d">on ivory</span>
      <div class="mark">
        <div class="glyph">
          <svg viewBox="0 0 40 40" fill="none">
            <path d="M4 34 L20 6 L36 34 Z" stroke="#A87A22" stroke-width="2" stroke-linejoin="round"/>
            <path d="M11 34 L20 18 L29 34" stroke="#A87A22" stroke-width="2" stroke-linejoin="round" opacity="0.55"/>
          </svg>
        </div>
        <div class="name" style="color:#2A1F12">Visit<b style="color:#A87A22"> Sudan</b></div>
      </div>
    </div>
    <div class="logo l-gold" style="position:relative">
      <span class="lbl d">on gold</span>
      <div class="mark">
        <div class="glyph">
          <svg viewBox="0 0 40 40" fill="none">
            <path d="M4 34 L20 6 L36 34 Z" stroke="#1A1208" stroke-width="2" stroke-linejoin="round"/>
            <path d="M11 34 L20 18 L29 34" stroke="#1A1208" stroke-width="2" stroke-linejoin="round" opacity="0.55"/>
          </svg>
        </div>
        <div class="name" style="color:#1A1208">Visit<b style="font-weight:600"> Sudan</b></div>
      </div>
    </div>
  </div>
</body></html>
